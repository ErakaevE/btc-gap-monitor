name: btc-gap-scan

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run scanner
        run: |
          python btc_gap_scanner.py \
            --json docs/data/latest.json \
            --history docs/data/history.jsonl

      - name: Trim history to last 3000 runs
        run: |
          tail -n 3000 docs/data/history.jsonl > /tmp/h && mv /tmp/h docs/data/history.jsonl

      - name: Commit results
        run: |
          git config user.name "scanner-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          git commit -m "scan $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "no changes"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push
